plugins:
  - rubocop-rails
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 2.7
  SuggestExtensions: false
  Exclude:
    - "spec/dummy/db/schema.rb"
    - "spec/dummy/bin/**/*"
    - "vendor/**/*"
    - "bin/**/*"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Lint/EmptyBlock:
  Exclude:
    - "config/routes.rb"

Rails/RakeEnvironment:
  Exclude:
    - "lib/tasks/ruby_sage_tasks.rake"

RSpec/ExampleLength:
  Max: 8
  Exclude:
    - "spec/lib/**/*_spec.rb"

RSpec/MultipleExpectations:
  Exclude:
    - "spec/lib/**/*_spec.rb"

RSpec/SpecFilePathFormat:
  Exclude:
    - "spec/lib/**/*_spec.rb"

RSpec/LeakyLocalVariable:
  Exclude:
    - "spec/lib/**/*_spec.rb"

RSpec/AnyInstance:
  Exclude:
    - "spec/lib/**/*_spec.rb"

RSpec/DescribeClass:
  Exclude:
    - "spec/lib/tasks/**/*_spec.rb"

Metrics/MethodLength:
  Exclude:
    - "db/migrate/*.rb"

Metrics/BlockLength:
  Exclude:
    - "lib/tasks/**/*.rake"
    - "spec/**/*_spec.rb"
