plugins:
  - rubocop-rails
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 2.7
  SuggestExtensions: false
  Exclude:
    - "spec/dummy/db/schema.rb"
    - "spec/dummy/bin/**/*"
    - "vendor/**/*"
    - "bin/**/*"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Lint/EmptyBlock:
  Exclude:
    - "config/routes.rb"

Rails/RakeEnvironment:
  Exclude:
    - "lib/tasks/ruby_sage_tasks.rake"

RSpec/ExampleLength:
  Max: 15
  Exclude:
    - "spec/lib/tasks/**/*_spec.rb"

RSpec/MultipleExpectations:
  Max: 7

Rails/I18nLocaleTexts:
  Enabled: false

RSpec/SpecFilePathFormat:
  Exclude:
    - "spec/lib/**/*_spec.rb"

RSpec/LeakyLocalVariable:
  Exclude:
    - "spec/lib/**/*_spec.rb"

RSpec/AnyInstance:
  Exclude:
    - "spec/lib/**/*_spec.rb"

RSpec/DescribeClass:
  Exclude:
    - "spec/lib/tasks/**/*_spec.rb"

Metrics/MethodLength:
  Max: 15
  Exclude:
    - "db/migrate/*.rb"
    - "spec/**/*_spec.rb"
    - "lib/ruby_sage/cli_chat.rb"

Metrics/AbcSize:
  Max: 25
  Exclude:
    - "lib/ruby_sage/cli_chat.rb"

# Heredoc-heavy renderer; class length is mostly markdown content, not behavior.
Metrics/ClassLength:
  Exclude:
    - "lib/ruby_sage/agent_scan/instructions.rb"

Metrics/BlockLength:
  Exclude:
    - "lib/tasks/**/*.rake"
    - "spec/**/*_spec.rb"

# CLI-style code intentionally writes to stdout and exits on fatal errors.
Rails/Output:
  Exclude:
    - "lib/ruby_sage/cli_chat.rb"

Rails/Exit:
  Exclude:
    - "lib/ruby_sage/cli_chat.rb"
    - "lib/tasks/**/*.rake"
